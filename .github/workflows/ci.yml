name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust substrate (release)
        run: cargo build --release

      - name: Run Rust tests
        run: cargo test

      - name: Install GHC
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.12.2'
          cabal-version: 'latest'

      - name: Cache Cabal dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Update Cabal package list
        run: cabal update

      - name: Write cabal.project.local with absolute lib path
        run: |
          echo "package glean-hs" > cabal.project.local
          echo "  extra-lib-dirs: ${{ github.workspace }}/target/release" >> cabal.project.local

      - name: Build Haskell layer
        run: |
          export LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH
          cabal build

      - name: Integration test — index glean-hs itself
        run: |
          export LD_LIBRARY_PATH=${{ github.workspace }}/target/release:$LD_LIBRARY_PATH
          cabal build --ghc-options="-fwrite-ide-info -hiedir=.hie"
          cabal run glean-hs -- index --hie-dir .hie --db /tmp/glean-ci-test
          cabal run glean-hs -- stats --db /tmp/glean-ci-test
          cabal run glean-hs -- query --db /tmp/glean-ci-test "checkError"
